<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álbum</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d63384">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#ffe4ec,#fff0f6);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:white;border-radius:24px;padding:40px 30px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(214,51,132,0.15);text-align:center}
    h1{margin:0 0 8px;color:#d63384;font-size:1.8rem}
    p{margin:0 0 30px;color:#7a4a63;font-size:0.95rem}
    input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid #f3bfd4;margin-bottom:14px;font-size:15px}
    button{width:100%;padding:14px;border-radius:14px;border:none;background:#ff6fae;color:white;font-size:16px;font-weight:bold;cursor:pointer}
    .error{color:#e63946;font-size:14px;margin-bottom:12px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Álbum 💖</h1>
    <p>Ingresa tus datos</p>
    <div class="error" id="error"></div>
    <form id="form">
      <input id="email" type="email" placeholder="Correo" required>
      <input id="password" type="password" placeholder="Contraseña" required>
      <button type="submit">Entrar</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://jodqkybcpxvqfxdqthfk.supabase.co"
    const SUPABASE_KEY = "sb_publishable_EClHgpUxwV7Bshxeva7fww_HejLA6OF"
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    const session = localStorage.getItem('supabase_session')
    if (session) {
      const s = JSON.parse(session)
      if (s && s.expires_at > Date.now() / 1000) {
        location.href = 'dashboard.html'
      }
    }

    document.getElementById('form').onsubmit = async (e) => {
      e.preventDefault()
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const errorEl = document.getElementById('error')
      
      errorEl.textContent = ''
      
      const { error } = await supabase.auth.signInWithPassword({ email, password })
      
      if (error) {
        errorEl.textContent = error.message
        return
      }
      
      location.href = 'dashboard.html'
    }
  </script>
</body>
</html>
