<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álbum</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d63384">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #fff0f6, #ffe4ec); min-height: 100vh; color: #4a2340; }
    .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    h1 { color: #d63384; font-size: 1.3rem; flex: 1; }
    .btn { padding: 10px 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
    .btn-secondary { background: white; color: #d63384; border: 1px solid #ffd0e2; }
    .btn-danger { background: #e63946; color: white; }
    
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .item { aspect-ratio: 1; border-radius: 4px; overflow: hidden; cursor: pointer; position: relative; }
    .item img { width: 100%; height: 100%; object-fit: cover; }
    .video-icon { position: absolute; bottom: 8px; right: 8px; font-size: 18px; }
    
    .empty { text-align: center; padding: 60px 20px; color: #7a4a63; }
    
    .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; border: none; background: #d63384; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 4px 12px rgba(214, 51, 132, 0.4); }
    
    .viewer { position: fixed; inset: 0; background: black; display: none; align-items: center; justify-content: center; z-index: 2000; }
    .viewer.show { display: flex; }
    .viewer img, .viewer video { max-width: 100%; max-height: 100%; object-fit: contain; }
    .viewer-close { position: absolute; top: 16px; left: 16px; width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.2); color: white; font-size: 20px; cursor: pointer; }
    .viewer-prev, .viewer-next { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%; border: none; background: rgba(255,255,255,0.2); color: white; font-size: 20px; cursor: pointer; }
    .viewer-prev { left: 16px; }
    .viewer-next { right: 16px; }
    .viewer-menu-btn { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.2); color: white; font-size: 20px; cursor: pointer; }
    .viewer-menu { display: none; position: absolute; top: 60px; right: 16px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .viewer-menu button { display: block; width: 100%; padding: 14px 20px; border: none; background: white; text-align: left; cursor: pointer; font-size: 15px; color: #333; }
    .viewer-menu button.danger { color: #e63946; }
    
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
    .modal.show { display: flex; }
    .modal-card { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 300px; text-align: center; }
    .modal-card h3 { color: #d63384; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 10px; justify-content: center; }
    
    input { display: none; }
    
    @media (min-width: 600px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="dashboard.html" class="btn btn-secondary">←</a>
      <h1>Álbum</h1>
      <button class="btn btn-danger" id="deleteBtn">🗑️</button>
    </div>

    <div class="grid" id="photoGrid"></div>
  </div>

  <input type="file" id="fileInput" accept="image/*,video/*" multiple>
  <button class="fab" id="uploadBtn">+</button>

  <div class="viewer" id="viewer">
    <button class="viewer-close" id="vClose">✕</button>
    <button class="viewer-prev" id="vPrev">❮</button>
    <button class="viewer-next" id="vNext">❯</button>
    <button class="viewer-menu-btn" id="vMenu">⋮</button>
    <div class="viewer-menu" id="vDropdown">
      <button id="vShare">Compartir</button>
      <button id="vDelete" class="danger">Eliminar</button>
    </div>
    <div id="vContent"></div>
  </div>

  <div class="modal" id="deleteModal">
    <div class="modal-card">
      <h3>¿Eliminar esta foto?</h3>
      <div class="modal-actions">
        <button class="btn btn-danger" id="yesBtn">Sí</button>
        <button class="btn btn-secondary" id="noBtn">No</button>
      </div>
    </div>
  </div>

  <script src="src/db.js"></script>
  <script src="src/api.js"></script>
  <script src="src/album.js"></script>
</body>
</html>
