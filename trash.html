<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papelera</title>

  <link rel="stylesheet" href="css/style.css?v=3">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d63384">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Álbum">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,#fff0f6,#ffe4ec);
      min-height:100vh;
      color:#4a2340;
    }

    .trash-page{
      max-width:1200px;
      margin:auto;
      padding:24px 16px 40px;
    }

    .trash-topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .trash-title{
      margin:0;
      color:#d63384;
      font-size:1.9rem;
    }

    .trash-subtitle{
      margin:8px 0 0;
      color:#7a4a63;
    }

    .trash-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      border:none;
      padding:12px 18px;
      border-radius:12px;
      cursor:pointer;
      font-size:15px;
      font-weight:bold;
      transition:.25s ease;
    }

    .btn-primary{
      background:#ff6fae;
      color:white;
      box-shadow:0 10px 20px rgba(214,51,132,.18);
    }

    .btn-secondary{
      background:white;
      color:#d63384;
      border:1px solid #ffd0e2;
    }

    .btn-danger{
      background:#e63946;
      color:white;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .trash-menu-wrap{
      position:relative;
    }

    .trash-menu-btn{
      width:44px;
      height:44px;
      border:none;
      border-radius:999px;
      background:white;
      color:#d63384;
      font-size:24px;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(0,0,0,.08);
    }



    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:12px;
    }

    .media-card{
      background:white;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
      aspect-ratio:1/1;
      position:relative;
      border:1px solid #ffe2ec;
      cursor:pointer;
    }

    .media-inner{
      width:100%;
      height:100%;
      position:relative;
      background:#fdf6f9;
    }

    .media-preview{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#f8f1f5;
    }

    .media-badge{
      position:absolute;
      top:10px;
      right:10px;
      background:rgba(255,255,255,.94);
      color:#d63384;
      font-size:.8rem;
      font-weight:bold;
      padding:6px 8px;
      border-radius:999px;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
      z-index:2;
    }

    .empty-state{
      background:white;
      border-radius:20px;
      padding:32px 20px;
      text-align:center;
      color:#7a4a63;
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .viewer-modal{
      position:fixed;
      inset:0;
      background:rgba(20, 10, 18, .88);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
      padding:20px;
    }

    .viewer-content{
      position:relative;
      width:min(100%, 980px);
      height:min(85vh, 760px);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .viewer-media{
      max-width:100%;
      max-height:100%;
      border-radius:18px;
      box-shadow:0 16px 40px rgba(0,0,0,.28);
      background:#111;
    }

    .viewer-close{
      position:absolute;
      top:-8px;
      left:-8px;
      width:44px;
      height:44px;
      border:none;
      border-radius:999px;
      background:white;
      color:#d63384;
      font-size:24px;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(0,0,0,.2);
      z-index:3;
    }

    .viewer-menu-wrap{
      position:absolute;
      top:-8px;
      right:-8px;
      z-index:4;
    }

    .viewer-menu-btn{
      width:44px;
      height:44px;
      border:none;
      border-radius:999px;
      background:white;
      color:#d63384;
      font-size:24px;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(0,0,0,.2);
    }



    .confirm-modal{
      position:fixed;
      inset:0;
      background:rgba(20, 10, 18, .58);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1100;
      padding:20px;
    }

    .confirm-card{
      width:min(100%, 430px);
      background:white;
      border-radius:20px;
      padding:24px;
      box-shadow:0 18px 42px rgba(0,0,0,.22);
      text-align:center;
    }

    .confirm-card h3{
      margin-top:0;
      color:#d63384;
    }

    .confirm-card p{
      color:#6f4960;
      line-height:1.6;
      margin-bottom:20px;
    }

    .confirm-actions{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }
  </style>
</head>
<body>
  <div class="trash-page">
    <div class="trash-topbar">
      <div>
        <h1 class="trash-title">Papelera 🗑️</h1>
      </div>

      <div class="trash-actions">
        <button class="btn btn-primary" id="backBtn">Volver</button>

        <div class="trash-menu-wrap">
          <button class="trash-menu-btn" id="trashMenuBtn" type="button">⋮</button>
          <div class="trash-dropdown" id="trashDropdown">
            <button type="button" id="restoreAllBtn">
              <span>Recuperar todo</span> ♻️
            </button>
            <button type="button" id="emptyTrashBtn" class="text-danger">
              <span>Vaciar la papelera</span> 🗑️
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>
  </div>

  <div class="viewer-modal" id="viewerModal">
    <div class="viewer-content">
      <button class="viewer-close" id="viewerCloseBtn" type="button">×</button>

      <div class="viewer-menu-wrap">
        <button class="viewer-menu-btn" id="viewerMenuBtn" type="button">⋮</button>
        <div class="viewer-dropdown" id="viewerDropdown">
          <button type="button" id="restoreOneBtn">
            <span>Recuperar</span> ♻️
          </button>
          <button type="button" id="deleteForeverBtn" class="text-danger">
            <span>Eliminar definitivamente</span> 🗑️
          </button>
        </div>
      </div>

      <div id="viewerMediaContainer"></div>
    </div>
  </div>

  <div class="confirm-modal" id="confirmModal">
    <div class="confirm-card">
      <h3 id="confirmTitle">Confirmar acción</h3>
      <p id="confirmText">¿Deseas continuar?</p>
      <div class="confirm-actions">
        <button class="btn btn-danger" id="confirmYesBtn" type="button">Sí</button>
        <button class="btn btn-secondary" id="confirmNoBtn" type="button">No</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/trash.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
