<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nuestros Álbumes</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d63384">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Álbum">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <link rel="stylesheet" href="css/style.css">

  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,#fff0f6,#ffe4ec);
      min-height:100vh;
      color:#4a2340;
    }

    .albums-container{
      max-width:1100px;
      margin:auto;
      padding:30px 20px 60px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }

    .title-block h1{
      margin:0;
      color:#d63384;
      font-size:2rem;
    }

    .title-block p{
      margin:8px 0 0;
      color:#7a4a63;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      padding:12px 18px;
      border-radius:12px;
      cursor:pointer;
      font-size:15px;
      font-weight:bold;
      transition:.25s ease;
      text-decoration:none;
      display:inline-block;
    }

    .btn-primary{
      background:#ff6fae;
      color:white;
      box-shadow:0 10px 20px rgba(214,51,132,.18);
    }

    .btn-secondary{
      background:white;
      color:#d63384;
      border:1px solid #ffd0e2;
    }

    .btn-danger{
      background:#e63946;
      color:white;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .album-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:18px;
    }

    .album-card{
      background:white;
      border-radius:20px;
      padding:16px;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
      position:relative;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .album-cover{
      width:100%;
      height:140px;
      border-radius:14px;
      background:linear-gradient(135deg,#fff,#fff7fb);
      border:1px solid #ffe0ec;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      flex-shrink:0;
    }

    .album-content{
      z-index:1;
    }

    .album-name{
      font-size:1.05rem;
      font-weight:bold;
      color:#d63384;
      word-break:break-word;
      margin-bottom:8px;
    }

    .album-date{
      font-size:.9rem;
      color:#8b6077;
    }

    .menu-wrap{
      position:absolute;
      top:8px;
      right:8px;
      z-index:4;
      opacity:0;
      transition:opacity .2s;
    }

    .album-card:hover .menu-wrap,
    .menu-wrap:focus-within{
      opacity:1;
    }

    @media (hover:none) and (pointer:coarse){
      .menu-wrap{
        opacity:1;
      }
    }

    .menu-btn{
      width:28px;
      height:28px;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.85);
      box-shadow:0 2px 6px rgba(0,0,0,.15);
      cursor:pointer;
      font-size:16px;
      line-height:1;
      color:#d63384;
    }

    .menu-dropdown{
      display:none;
      position:absolute;
      top:46px;
      right:0;
      min-width:170px;
      background:white;
      border-radius:14px;
      box-shadow:0 14px 28px rgba(0,0,0,.18);
      overflow:hidden;
      border:1px solid #ffd9e8;
    }

    .menu-dropdown.open{
      display:block;
    }

    .menu-dropdown button{
      width:100%;
      display:block;
      border:none;
      background:white;
      color:#d63384;
      padding:14px 16px;
      text-align:left;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
    }

    .menu-dropdown button:hover{
      background:#fff2f7;
    }

    .empty-state{
      background:white;
      border-radius:20px;
      padding:32px 20px;
      text-align:center;
      color:#7a4a63;
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(20, 10, 18, .58);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
      padding:20px;
    }

    .modal-card{
      width:min(100%, 430px);
      background:white;
      border-radius:20px;
      padding:24px;
      box-shadow:0 18px 42px rgba(0,0,0,.22);
      text-align:center;
    }

    .modal-card h3{
      margin-top:0;
      color:#d63384;
    }

    .modal-card p{
      color:#6f4960;
      line-height:1.6;
      margin-bottom:20px;
    }

    .modal-card input{
      width:100%;
      box-sizing:border-box;
      padding:14px;
      border-radius:12px;
      border:1px solid #f1c5d9;
      margin-bottom:10px;
      font-size:15px;
      outline:none;
    }

    .modal-error{
      min-height:20px;
      font-size:.9rem;
      color:#e63946;
      margin-bottom:14px;
    }

    .modal-actions{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }
  </style>
</head>

<body>

  <div class="albums-container">
    <div class="topbar">
      <div class="title-block">
        <h1>Nuestros Álbumes 💖</h1>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="createAlbum">Crear álbum</button>
        <a class="btn btn-secondary" href="trash.html">Papelera</a>
        <button class="btn btn-secondary" id="logoutBtn">Cerrar sesión</button>
      </div>
    </div>

    <div class="album-grid" id="albumGrid"></div>
  </div>

  <div class="modal" id="createModal">
    <div class="modal-card">
      <h3>Crear álbum</h3>
      <input type="text" id="createAlbumInput" placeholder="Nombre del álbum">
      <div class="modal-error" id="createAlbumError"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="saveCreateBtn">Crear</button>
        <button class="btn btn-secondary" id="cancelCreateBtn">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="modal" id="editModal">
    <div class="modal-card">
      <h3>Editar álbum</h3>
      <input type="text" id="editAlbumInput">
      <div class="modal-error" id="editAlbumError"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="saveEditBtn">Guardar</button>
        <button class="btn btn-secondary" id="cancelEditBtn">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="modal" id="deleteModal">
    <div class="modal-card">
      <h3>¿Deseas eliminar este álbum?</h3>
      <p>Esta acción eliminará el álbum de tu lista.</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirmDeleteBtn">Sí, eliminar</button>
        <button class="btn btn-secondary" id="cancelDeleteBtn">No</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/albums.js"></script>
  <script src="js/pwa.js"></script>

</body>
</html>
